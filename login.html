<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acessar - AgendAi</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">

  <!-- SDK OFICIAL DO SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg-light: #F8FAFC;
      --card-bg: #FFFFFF;
      --text-dark: #0F172A;
      --text-gray: #64748B;
      --border-color: #E2E8F0;
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --error-color: #EF4444;
      --success-color: #22C55E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background-color: var(--bg-light);
      color: var(--text-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: var(--card-bg);
      width: 100%;
      max-width: 400px;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -1px;
      margin-bottom: 8px;
      text-decoration: none;
      display: inline-block;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-gray);
      margin-bottom: 30px;
    }

    /* BOTÃO DO GOOGLE */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px;
      background: #FFFFFF;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 24px;
    }
    .btn-google:hover {
      background: #F1F5F9;
      border-color: #CBD5E1;
    }
    .btn-google svg {
      width: 18px;
      height: 18px;
    }

    /* DIVISOR */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-gray);
      font-size: 12px;
      margin-bottom: 24px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }
    .divider span {
      padding: 0 10px;
    }

    /* FORMULÁRIO */
    .input-group {
      text-align: left;
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-dark);
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: var(--primary);
    }

    .forgot-password {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
      margin-top: 6px;
      font-weight: 500;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }
    .btn-submit:hover {
      background: var(--primary-hover);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* MENSAGENS DE ALERTA */
    .msg-feedback {
      font-size: 13px;
      margin-top: 14px;
      display: none;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
    }
    .msg-feedback.error {
      display: block;
      background: #FEE2E2;
      color: var(--error-color);
    }
    .msg-feedback.success {
      display: block;
      background: #DCFCE7;
      color: var(--success-color);
    }

    /* RODAPÉ DO LOGIN */
    .login-footer {
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-gray);
    }
    .login-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .login-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <a href="index.html" class="logo">AgendAi.</a>
    <p class="subtitle" id="form-subtitle">Acesse sua conta ou inicie seu teste grátis</p>

    <!-- Botão do Google -->
    <button class="btn-google" type="button" onclick="loginGoogle()">
      <svg viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continuar com o Google
    </button>

    <div class="divider">
      <span>ou use seu e-mail</span>
    </div>

    <!-- Formulário de Autenticação -->
    <form id="auth-form" onsubmit="handleAuth(event)">
      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required>
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" required>
        <a href="#" class="forgot-password" id="forgot-link" onclick="resetPassword(event)">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="btn-submit" id="btn-submit-text">Entrar</button>
      <div id="msg-box" class="msg-feedback"></div>
    </form>

    <!-- Rodapé que alterna o modo -->
    <div class="login-footer" id="footer-text">
      Ainda não tem conta? <a onclick="toggleMode()">Criar conta grátis</a>
    </div>
  </div>

  <script>
    // 1. INICIALIZAÇÃO DO SUPABASE
    const SUPABASE_URL = "https://yhecaaajbgetcnfdcqxj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_vC-kDlXaBKScT93cWrCJSQ_ENF23HFK";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isLoginMode = true;

    // Alterna entre modo Login e Cadastro
    function toggleMode() {
      isLoginMode = !isLoginMode;
      const subtitle = document.getElementById('form-subtitle');
      const submitBtn = document.getElementById('btn-submit-text');
      const forgotLink = document.getElementById('forgot-link');
      const footerText = document.getElementById('footer-text');
      hideMsg();

      if (isLoginMode) {
        subtitle.innerText = "Acesse sua conta ou inicie seu teste grátis";
        submitBtn.innerText = "Entrar";
        forgotLink.style.display = "block";
        footerText.innerHTML = 'Ainda não tem conta? <a onclick="toggleMode()">Criar conta grátis</a>';
      } else {
        subtitle.innerText = "Crie sua conta e ganhe 7 dias grátis";
        submitBtn.innerText = "Cadastrar";
        forgotLink.style.display = "none";
        footerText.innerHTML = 'Já tem uma conta? <a onclick="toggleMode()">Fazer Login</a>';
      }
    }

    // Exibe mensagens de Erro ou Sucesso
    function showMsg(text, type = 'error') {
      const msgBox = document.getElementById('msg-box');
      msgBox.innerText = text;
      msgBox.className = `msg-feedback ${type}`;
    }

    function hideMsg() {
      const msgBox = document.getElementById('msg-box');
      msgBox.style.display = 'none';
    }

    // 2. LÓGICA PRINCIPAL DE AUTENTICAÇÃO (LOGIN / CADASTRO)
    async function handleAuth(event) {
      event.preventDefault();
      hideMsg();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-submit-text');

      btn.disabled = true;

      try {
        if (isLoginMode) {
          // --- MODO LOGIN ---
          btn.innerText = "Entrando...";
          
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (error) throw new Error("E-mail ou senha incorretos.");

          // Valida a permissão no banco de dados (tabela perfis)
          const { data: perfil, error: perfilErr } = await supabaseClient
            .from('perfis')
            .select('status')
            .eq('id', data.user.id)
            .single();

          if (perfilErr || !perfil) {
            throw new Error("Perfil não encontrado no sistema.");
          }

          if (perfil.status !== 'ativo') {
            await supabaseClient.auth.signOut(); // Desloga por segurança
            throw new Error("Sua conta está bloqueada ou pendente de liberação.");
          }

          // Se estiver ativo, vai para a Home
          window.location.href = "home.html";

        } else {
          // --- MODO CADASTRO ---
          btn.innerText = "Cadastrando...";

          const { data, error } = await supabaseClient.auth.signUp({
            email: email,
            password: password
          });

          if (error) throw error;

          showMsg("Conta criada com sucesso! Você já pode fazer login.", "success");
          toggleMode(); // Volta para a tela de login
        }
      } catch (err) {
        showMsg(err.message || "Ocorreu um erro. Tente novamente.");
      } finally {
        btn.disabled = false;
        btn.innerText = isLoginMode ? "Entrar" : "Cadastrar";
      }
    }

    // 3. RECUPERAÇÃO DE SENHA
    async function resetPassword(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showMsg("Digite seu e-mail no campo acima primeiro.");
        return;
      }

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
      if (error) {
        showMsg("Erro ao enviar e-mail de recuperação.");
      } else {
        showMsg("E-mail de redefinição enviado! Verifique sua caixa de entrada.", "success");
      }
    }

    // 4. LOGIN COM GOOGLE
    async function loginGoogle() {
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google'
      });
      if (error) showMsg("Erro ao conectar com o Google.");
    }
  </script>

</body>
</html>
